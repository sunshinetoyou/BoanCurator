version: '3.8'

services:
  db:
    image: postgres:15
    container_name: security_db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: security_curator
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # FastAPI 서버 (조회 + 검색 + 추천)
  api:
    build: .
    container_name: security_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 11278
    ports:
      - "11278:11278"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/security_curator
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - chroma_data:/app/chroma_data

  # Scraper Worker (수집 전용)
  scraper_worker:
    build: .
    container_name: security_scraper
    command: python -m workers.new_scraper_bot
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/security_curator

  # Analysis Worker (분석 + 멀티모달 임베딩)
  analysis_worker:
    build: .
    container_name: security_analyzer
    command: python -m workers.analysis_bot
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/security_curator
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - chroma_data:/app/chroma_data

volumes:
  chroma_data:
