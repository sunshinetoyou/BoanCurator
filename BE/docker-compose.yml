version: '3.8'

services:
  db:
    image: postgres:17
    container_name: boan_db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DATABASE_USER} -d bc_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PW}
      POSTGRES_DB: bc_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # FastAPI 서버 (조회 + 검색 + 추천)
  api:
    build: .
    container_name: boan_api
    command: bash -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 11278"
    ports:
      - "11278:11278"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PW}@db:5432/bc_db
      GEMINI_API_KEYS: ${GEMINI_API_KEYS}
    volumes:
      - chroma_data:/app/chroma_data

  # Scraper Worker (수집 전용)
  scraper_worker:
    build: .
    container_name: boan_scraper
    command: python -m workers.new_scraper_bot
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PW}@db:5432/bc_db

  # Analysis Worker (분석 + 멀티모달 임베딩)
  analysis_worker:
    build: .
    container_name: boan_analyzer
    command: python -m workers.analysis_bot
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PW}@db:5432/bc_db
      ANALYSIS_ENGINE: ${ANALYSIS_ENGINE:-gemini}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS}
      PYTHONUNBUFFERED: "1"
    volumes:
      - chroma_data:/app/chroma_data
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json

  # Notification Worker (키워드 매칭 + 푸시 알림)
  notification_worker:
    build: .
    container_name: boan_notifier
    command: python -m workers.notification_bot
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PW}@db:5432/bc_db
      GEMINI_API_KEYS: ${GEMINI_API_KEYS}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
    volumes:
      - chroma_data:/app/chroma_data

  # Watchtower (Docker 이미지 자동 업데이트)
  watchtower:
    image: containrrr/watchtower
    container_name: boan_watchtower
    restart: always
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
      DOCKER_API_VERSION: "1.40"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  chroma_data:
